version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: plantex-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 30s
    networks:
      - plantex_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: plantex-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
      interval: 10s
    networks:
      - plantex_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: plantex-web-prod
    restart: unless-stopped
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: pltx_dashboard.settings
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      SECURE_SSL_REDIRECT: "True"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs
      - upload_tmp:/tmp/upload_queue
    networks:
      - plantex_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      timeout: 10s
      retries: 5
      interval: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: plantex-celery-worker-prod
    restart: unless-stopped
    command: sh -c "cd pltx_dashboard && celery -A pltx_dashboard worker -l info --concurrency=4"
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: pltx_dashboard.settings
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - mysql
      - redis
      - web
    volumes:
      - logs_volume:/app/logs
      - upload_tmp:/tmp/upload_queue
    networks:
      - plantex_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: plantex-celery-beat-prod
    restart: unless-stopped
    command: sh -c "cd pltx_dashboard && celery -A pltx_dashboard beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: pltx_dashboard.settings
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - mysql
      - redis
      - web
    volumes:
      - logs_volume:/app/logs
    networks:
      - plantex_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  redis_data:
  static_volume:
  logs_volume:
  upload_tmp:

networks:
  plantex_network:
    driver: bridge
